name: Etsy Daily Report Bot

on:
  schedule:
    # UTC 06:00, Türkiye saatiyle 09:00 eder.
    - cron: '0 6 * * *'
  workflow_dispatch: # Manuel çalıştırmak istersen

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v4 # v2 yerine güncel sürüm
        with:
          python-version: '3.11' # 3.9 yerine 3.11 kullanıyoruz

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 google-generativeai

      - name: Run Python script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python main.py
